<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>CEO Suite | Executive Terminal</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --sidebar: #1e293b;
            --light: #f8fafc;
            --text-muted: #64748b;
            --meeting: #8b5cf6;
            --project: #10b981;
            --client: #f59e0b;
            --general: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--light);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- NEW: Welcome/Splash Screen --- */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 4000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .welcome-logo {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .welcome-sub {
            color: var(--primary);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .enter-btn {
            margin-top: 40px;
            padding: 12px 30px;
            border: 1px solid var(--primary);
            background: transparent;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--primary);
        }

        /* Existing Styles... */
        .sidebar {
            width: 240px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.hidden {
            display: none;
        }

        .nav-item {
            background: none;
            border: none;
            color: #94a3b8;
            padding: 14px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        section {
            display: none;
        }

        section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        select,
        textarea,
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            text-align: center;
        }

        .top-tools {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
        }

        .noti-bell {
            cursor: pointer;
            font-size: 22px;
            position: relative;
        }

        .noti-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            display: none;
            animation: pulse 1.5s infinite;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 25px;
        }

        .hamburger span {
            height: 3px;
            width: 100%;
            background: var(--dark);
            border-radius: 10px;
        }

        .data-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.15);
            z-index: 2000;
            transition: 0.4s;
            padding: 30px;
            overflow-y: auto;
        }

        .data-drawer.open {
            right: 0;
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 1999;
            backdrop-filter: blur(2px);
        }

        .drawer-overlay.active {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .bg-meeting {
            background: var(--meeting);
        }

        .bg-project {
            background: var(--project);
        }

        .bg-client {
            background: var(--client);
        }

        .bg-general {
            background: var(--general);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="welcome-screen">
        <div class="welcome-logo">💎</div>
        <div class="welcome-title">THE CEO SUITE</div>
        <div class="welcome-sub">Executive Strategic Terminal</div>
        <button class="enter-btn" onclick="startSystem()">INITIALIZE SYSTEM</button>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--dark);">Chief's Terminal</h1>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button class="btn-login" onclick="handleLogin()">Authorize Access</button>
            <button class="btn-login" style="background:white; color:#333; border:1px solid #ddd; margin-top:10px;"
                onclick="handleLogin()">Continue with Google</button>
        </div>
    </div>

    <aside class="sidebar hidden" id="sidebar">
        <div style="margin-bottom: 30px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <small style="color: var(--primary);">WELCOME,</small>
            <div id="display-name" style="font-weight: bold;">CHIEF</div>
        </div>
        <button class="nav-item active" onclick="showPage('home', this)">Home</button>
        <button class="nav-item" onclick="showPage('notepad', this)">Notepad</button>
        <button class="nav-item" onclick="showPage('record', this)">Records</button>
        <button class="nav-item" onclick="showPage('chatbot', this)">AI Assistant</button>
        <button class="nav-item" style="margin-top:auto; color: #f87171;" onclick="location.reload()">Logout</button>
    </aside>

    <main class="main-content">
        <div class="top-tools">
            <div class="noti-bell" onclick="showPage('record', document.querySelectorAll('.nav-item')[2])">
                🔔<span id="noti-count" class="noti-badge">0</span>
            </div>
            <div class="hamburger" onclick="toggleDrawer()">
                <span></span><span></span><span></span>
            </div>
        </div>

        <section id="home" class="active">
            <h2>Executive Summary</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>Total Records</h3>
                    <h1 id="event-stat">0</h1>
                </div>
                <div class="card">
                    <h3>Status</h3>
                    <h1 style="color: #10b981;">Online</h1>
                </div>
            </div>
        </section>

        <section id="notepad">
            <h2>New Strategic Entry</h2>
            <div class="card">
                <label>Category:</label>
                <select id="note-category">
                    <option value="meeting">Meeting</option>
                    <option value="project">Project</option>
                    <option value="client">Client</option>
                    <option value="general">General</option>
                </select>
                <label>Set Time Alert:</label>
                <input type="time" id="note-time">
                <textarea id="note-input" rows="4" placeholder="Enter details..."></textarea>
                <button class="btn-login" onclick="saveEntry()">Save & Synchronize</button>
            </div>
        </section>

        <section id="record">
            <h2>Intelligence Logs</h2>
            <div id="record-container"></div>
        </section>

        <section id="chatbot">
            <h2>AI Assistant</h2>
            <div class="card">
                <div id="chat-window"
                    style="height:300px; overflow-y:auto; margin-bottom:15px; background:#f8fafc; padding:20px; border-radius:8px; border:1px solid #e2e8f0; font-size: 14px;">
                    <div style="color: var(--primary); font-weight: bold;">Bot: Ready, Sir.</div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-query" placeholder="Ask about projects/meetings...">
                    <button class="btn-login" style="width: 100px;" onclick="askAssistant()">Query</button>
                </div>
            </div>
        </section>
    </main>

    <div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div class="data-drawer" id="dataDrawer">
        <h2 style="margin-top:0;">Master History</h2>
        <div id="drawer-content"></div>
    </div>

    <audio id="noti-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <script>
        let records = JSON.parse(localStorage.getItem('ceo_v3_data')) || [];
        let notifications = 0;

        // --- NEW: Start System Logic ---
        function startSystem() {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => welcome.style.visibility = 'hidden', 800);
        }

        function handleLogin() {
            const user = document.getElementById('username').value || "CHIEF";
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.toUpperCase();
            startNotificationEngine();
        }

        // Rest of your JS functions (showPage, saveEntry, askAssistant, startNotificationEngine) 
        // should be pasted here from your previous code...
        function showPage(p, btn) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if (btn) btn.classList.add('active');
            if (p === 'record') resetNoti();
        }

        function toggleDrawer() {
            document.getElementById('dataDrawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
            renderDrawer();
        }

        function saveEntry() {
            const text = document.getElementById('note-input').value;
            const cat = document.getElementById('note-category').value;
            const time = document.getElementById('note-time').value;
            if (!text.trim()) return alert("Input details.");

            records.push({
                text, category: cat, alertTime: time, triggered: false,
                date: new Date().toLocaleDateString(),
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            localStorage.setItem('ceo_v3_data', JSON.stringify(records));
            document.getElementById('note-input').value = "";
            updateStats(); renderRecords();
            alert("Synchronized.");
        }

        function updateStats() { document.getElementById('event-stat').innerText = records.length; }

        function renderRecords() {
            const container = document.getElementById('record-container');
            container.innerHTML = records.map(r => `
                <div class="card" style="border-left: 6px solid var(--${r.category})">
                    <span class="badge bg-${r.category}">${r.category}</span>
                    <p>${r.text}</p>
                    <small>${r.date} | ${r.alertTime || r.timestamp}</small>
                </div>
            `).join('');
        }

        function renderDrawer() {
            const content = document.getElementById('drawer-content');
            content.innerHTML = [...records].reverse().map(r => `
                <div style="padding:10px 0; border-bottom:1px solid #eee;">
                    <b>${r.category.toUpperCase()}</b>: ${r.text}
                </div>
            `).join('') || "No data.";
        }

        function askAssistant() {
            const input = document.getElementById('chat-query');
            const query = input.value.toLowerCase().trim();
            const win = document.getElementById('chat-window');
            if (!query) return;
            win.innerHTML += `<div style="text-align:right;"><b>You:</b> ${query}</div>`;

            let reply = "Standing by...";
            if (query.includes("meeting")) {
                const meetings = records.filter(r => r.category === 'meeting');
                reply = meetings.length > 0 ? "Meetings:<br>" + meetings.map(m => `• ${m.text}`).join("<br>") : "No meetings.";
            } else if (query.includes("project")) {
                const projects = records.filter(r => r.category === 'project');
                reply = projects.length > 0 ? "Projects:<br>" + projects.map(p => `• ${p.text}`).join("<br>") : "No projects.";
            }

            setTimeout(() => {
                win.innerHTML += `<div style="color:var(--primary)"><b>Bot:</b> ${reply}</div>`;
                win.scrollTop = win.scrollHeight;
            }, 500);
            input.value = "";
        }

        function startNotificationEngine() {
            setInterval(() => {
                const now = new Date();
                const curTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                records.forEach(r => {
                    if (r.alertTime === curTime && !r.triggered) {
                        triggerAlert(r);
                        r.triggered = true;
                        localStorage.setItem('ceo_v3_data', JSON.stringify(records));
                    }
                });
            }, 10000);
        }

        function triggerAlert(record) {
            notifications++;
            document.getElementById('noti-count').innerText = notifications;
            document.getElementById('noti-count').style.display = 'block';
            document.getElementById('noti-sound').play().catch(e => { });
            alert(`📢 ALERT: ${record.text}`);
        }

        function resetNoti() {
            notifications = 0;
            document.getElementById('noti-count').style.display = 'none';
        }

        window.onload = () => { renderRecords(); updateStats(); };
    </script>
</body>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
    }
</script>
</html>
